version: '3.9'

services:
  mexc-ghost-hunter:
    build: .
    container_name: mexc-ghost-hunter
    ports:
      - "7860:7860"      # Main port for both local and Hugging Face
    volumes:
      - ./data:/data     # Persistent SQLite database
    environment:
      - PORT=7860
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - ADMIN_PASSWORD=ghosthunter123          # Change this in production!
      - MIN_PROFIT_THRESHOLD=0.0015
      - TARGET_VOLUME_USD=1000.0
      - MIN_VOLUME_24H=500000.0
      - ENCRYPTION_SALT=mexc-ghost-hunter-salt-2026
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7860/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development frontend only (hot reload)
  frontend-dev:
    image: node:20-alpine
    container_name: mexc-frontend-dev
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
    depends_on:
      - mexc-ghost-hunter
