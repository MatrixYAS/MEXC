# Development Docker Compose - Quick Start
version: '3.8'

services:
  mexc-ghost-hunter:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ghosthunter123}
      DATA_DIR: /data
      MIN_PROFIT_THRESHOLD: 0.0015
      TARGET_VOLUME_USD: 1000.0
      MIN_VOLUME_24H: 500000.0
    volumes:
      - mexc-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mexc-data:
    driver: local
